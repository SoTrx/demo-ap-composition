services:

  app:
    image: ghcr.io/sotrx/sotrx/demo-ap-composition:v0.1.0
    labels:
    - traefik.enable=true
    - traefik.http.routers.demo-composition.rule=PathPrefix(`/demo-composition`)
    - traefik.http.routers.demo-composition.entrypoints=web
    - traefik.http.middlewares.demo-composition-strip.stripprefix.prefixes=/demo-composition
    - traefik.http.routers.demo-composition.middlewares=demo-composition-strip
    - traefik.http.services.demo-composition.loadbalancer.server.port=8501
    ports:
      - "8501:8501"
    environment:
      - AP_MANAGEMENT_SERVICE_URL=http://ap-management:5000
      - STREAMLIT_SERVER_BASE_URL_PATH=${APP_BASE_URL_PATH:-/}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501${APP_BASE_URL_PATH:-/}')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      ap-management:
        condition: service_healthy
    networks:
      - traefik
      - internal
  neo4j:
    image: neo4j:5.26
    labels:
      - traefik.enable=false
    environment:
      - NEO4J_AUTH=neo4j/momademo
    restart: always

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
    networks:
      - internal

  moma-management:
    image: ghcr.io/datagems-eosc/datagems-eosc/moma-management:v2.7.0
    labels:
      - traefik.enable=false
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=momademo
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - internal

  ap-management:
    image: ghcr.io/datagems-eosc/datagems-eosc/ap-management:v1.0.3
    labels:
      - traefik.enable=false
    environment:
      - MOMA_MANAGEMENT_URL=http://moma-management:5000
      - LLM_API_BASE=${LLM_API_BASE}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_MODEL=openai/scayle_qwen
      - LLM_SSL_VERIFY=false
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      moma-management:
        condition: service_healthy
    networks:
      - internal

networks:
  traefik:
    external: true
  internal:
    driver: bridge